version: '3.8'

services:
  vtk-workbench:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: vtk-workbench-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      # Mount public/wasm for development (optional)
      - ./public/wasm:/app/public/wasm:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Development service with hot reload
  vtk-workbench-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: development
    container_name: vtk-workbench-dev
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    restart: unless-stopped
    profiles: ["dev"]

# Optional: Add nginx reverse proxy for production-like testing
  nginx:
    image: nginx:alpine
    container_name: vtk-workbench-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - vtk-workbench
    restart: unless-stopped
    profiles: ["nginx"]

networks:
  default:
    driver: bridge

volumes:
  node_modules: